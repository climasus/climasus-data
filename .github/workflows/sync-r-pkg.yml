name: Sync data files to r-pkg

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # needed to commit and push back to the repo

jobs:
  sync:
    name: Sync JSONs → r-pkg/inst/extdata, R CMD check, commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so we can push back

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: use current DESCRIPTION version
            echo "VERSION=$(grep '^Version:' r-pkg/DESCRIPTION | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync JSON directories to r-pkg/inst/extdata
        run: |
          TARGET="r-pkg/inst/extdata"

          # clean previously synced data (keep .gitkeep)
          find "$TARGET" -mindepth 1 ! -name '.gitkeep' -delete

          # copy each data directory
          for dir in dictionaries disease_groups geo metadata; do
            cp -r "$dir" "$TARGET/$dir"
          done

          # copy manifest
          cp manifest.json "$TARGET/manifest.json"

          echo "Synced data files:"
          find "$TARGET" -type f | sort

      - name: Update Version in r-pkg/DESCRIPTION
        run: |
          sed -i "s/^Version: .*/Version: ${{ steps.version.outputs.VERSION }}/" r-pkg/DESCRIPTION

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R dependencies for check
        run: |
          install.packages(c("jsonlite", "testthat", "rcmdcheck"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: R CMD check --as-cran
        run: |
          rcmdcheck::rcmdcheck(
            path      = "r-pkg",
            args      = c("--as-cran", "--no-manual"),
            error_on  = "error"
          )
        shell: Rscript {0}

      - name: Commit and push updated r-pkg
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # -f: force-add files ignored by .gitignore (inst/extdata/*.json)
          git add -f r-pkg/inst/extdata/
          git add r-pkg/DESCRIPTION

          # only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(r-pkg): sync data files for v${{ steps.version.outputs.VERSION }} [skip ci]"
            git push origin HEAD:main
          fi
